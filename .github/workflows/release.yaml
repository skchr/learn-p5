name: Build & Publish Release APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          NPM_INSTALLED=false
          for i in 1 2 3; do
            echo "Attempt $i to install npm dependencies..."
            npm install && NPM_INSTALLED=true && echo "npm install succeeded" && break
            echo "npm install failed (attempt $i)"
            if [ $i -lt 3 ]; then sleep 10; fi
          done
          if [ "$NPM_INSTALLED" != "true" ]; then
            echo "Failed to install npm dependencies after 3 attempts"
            exit 1
          fi

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          NDK_INSTALLED=false
          for i in 1 2 3; do
            echo "Attempt $i to install NDK 27.1.12297006..."
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
              --install "ndk;27.1.12297006" || { echo "SDK manager failed"; sleep 10; continue; }
            NDK_DIR="$ANDROID_SDK_ROOT/ndk/27.1.12297006"
            if [ -d "$NDK_DIR" ]; then
              echo "NDK installed successfully at $NDK_DIR"
              NDK_INSTALLED=true
              break
            fi
            echo "NDK directory not found, retrying..."
            sleep 10
          done
          if [ "$NDK_INSTALLED" != "true" ]; then
            echo "Failed to install NDK after 3 attempts"
            exit 1
          fi

      - name: Prebuild native project
        run: |
          PREBUILT=false
          for i in 1 2 3; do
            echo "Attempt $i to prebuild native project..."
            npx expo prebuild --platform android --clean && PREBUILT=true && break
            echo "prebuild failed (attempt $i)"
            if [ $i -lt 3 ]; then sleep 10; fi
          done
          if [ "$PREBUILT" != "true" ]; then
            echo "Failed to prebuild native project after 3 attempts"
            exit 1
          fi

      - name: Configure ABI splits for per-architecture APKs
        run: |
          sed -i '/android {/a\
          \    splits {\
          \        abi {\
          \            enable true\
          \            reset()\
          \            include "arm64-v8a", "armeabi-v7a"\
          \            universalApk false\
          \        }\
          \    }' android/app/build.gradle

      - name: Build release APKs (per ABI)
        run: cd android && ./gradlew assembleRelease

      - name: List split APKs
        run: find android -name "*.apk" -type f

      - name: Rename APKs to learn-p5-{tag}-{arch}-debug.apk
        run: |
          for apk in android/app/build/outputs/apk/release/*.apk; do
            dir=$(dirname "$apk")
            base=$(basename "$apk")
            arch=$(echo "$base" | sed -n 's/.*\(arm64-v8a\|armeabi-v7a\).*/\1/p')
            [ -z "$arch" ] && arch=universal
            mv "$apk" "$dir/learn-p5-${{ github.ref_name }}-$arch-debug.apk"
          done

      - name: Upload split APKs to release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
